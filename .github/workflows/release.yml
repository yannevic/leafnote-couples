name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG_NEXT.txt'

jobs:
  build:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.author.name, 'github-actions[bot]')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Corrigir distutils para Python 3.12
        run: pip install setuptools

      - name: Instalar dependências
        run: npm install

      - name: Bump de versão e atualizar changelog
        id: bump
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          CHANGELOG_INPUT=$(cat CHANGELOG_NEXT.txt)
          echo "changelog_input=$CHANGELOG_INPUT" >> $GITHUB_OUTPUT

          ITEMS_JS=$(node -e "
            const raw = process.argv[1];
            const items = raw.split('|').map(s => s.trim()).filter(Boolean);
            console.log(JSON.stringify(items));
          " -- "$CHANGELOG_INPUT")

          node -e "
            const fs = require('fs');
            const version = '$NEW_VERSION';
            const items = $ITEMS_JS;

            const lines = items.map(i => \`    '\${i}',\`).join('\n');
            const newEntry = \`  '\${version}': [\n\${lines}\n  ],\n\`;

            let content = fs.readFileSync('./src/components/ChangelogModal.tsx', 'utf8');
            content = content.replace(
              /(const CHANGELOG: Record<string, string\[\]> = \{)/,
              '\$1\n' + newEntry
            );
            fs.writeFileSync('./src/components/ChangelogModal.tsx', content);
          "

      - name: Commit das mudanças
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/components/ChangelogModal.tsx
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git push

      - name: Build e empacotar
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Criar release e fazer upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: leafnote couples v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.bump.outputs.changelog_input }}
          files: |
            release/leafnote-couples-Setup-*.exe
            release/leafnote-couples-Setup-*.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
